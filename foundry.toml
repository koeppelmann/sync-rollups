[profile.default]
src = "src"
out = "out"
libs = ["lib"]
solc = "0.8.24"
optimizer = true
optimizer_runs = 200
via_ir = true

[profile.default.fmt]
line_length = 120
tab_width = 4
bracket_spacing = false
int_types = "long"
multiline_func_header = "all"
quote_style = "double"
number_underscore = "preserve"

[rpc_endpoints]
gnosis = "https://rpc.gnosischain.com"

[etherscan]
gnosis = { key = "${GNOSISSCAN_API_KEY}", url = "https://api.etherscan.io/v2/api?chainid=100", chain = 100 }
