services:
  l1-db:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_DB: blockscout_l1
      POSTGRES_USER: blockscout
      POSTGRES_PASSWORD: blockscout
    volumes:
      - l1-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U blockscout -d blockscout_l1"]
      interval: 5s
      timeout: 5s
      retries: 10

  l1-backend:
    image: blockscout/blockscout:latest
    restart: unless-stopped
    command: ["sh", "-c", "bin/blockscout eval 'Elixir.Explorer.ReleaseTasks.create_and_migrate()' && bin/blockscout start"]
    depends_on:
      l1-db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://blockscout:blockscout@l1-db:5432/blockscout_l1
      ETHEREUM_JSONRPC_VARIANT: geth
      ETHEREUM_JSONRPC_HTTP_URL: http://host.docker.internal:8546
      ETHEREUM_JSONRPC_TRACE_URL: http://host.docker.internal:8546
      NETWORK: Gnosis L1
      SUBNETWORK: Gnosis
      CHAIN_ID: "100"
      COIN: xDAI
      BLOCK_TRANSFORMER: base
      INDEXER_DISABLE_INTERNAL_TRANSACTIONS_FETCHER: "true"
      INDEXER_DISABLE_PENDING_TRANSACTIONS_FETCHER: "true"
      INDEXER_DISABLE_ADDRESS_COIN_BALANCE_FETCHER: "false"
      FIRST_BLOCK: "44674940"
      LAST_BLOCK: ""
      ECTO_USE_SSL: "false"
      SECRET_KEY_BASE: "56NtB48ear7+wMSf0IQuWDAAazhpb31qyc7GiyspBP2vh7t5zlCsF5QDv76Pn31Nlolb6gQ/lg=="
      PORT: "4000"
      API_V2_ENABLED: "true"
      DISABLE_EXCHANGE_RATES: "true"
      DISABLE_KNOWN_TOKENS: "true"
      SHOW_TXS_CHART: "true"
      HEART_BEAT_TIMEOUT: "30"
      INDEXER_MEMORY_LIMIT: "1g"
      FETCH_REWARDS_WAY: "manual"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "4010:4000"

  l1-frontend:
    image: ghcr.io/blockscout/frontend:latest
    restart: unless-stopped
    depends_on:
      - l1-backend
    environment:
      NEXT_PUBLIC_APP_HOST: 217.182.199.45
      NEXT_PUBLIC_APP_PORT: "4000"
      NEXT_PUBLIC_APP_PROTOCOL: http
      NEXT_PUBLIC_API_HOST: 217.182.199.45
      NEXT_PUBLIC_API_PORT: "4010"
      NEXT_PUBLIC_API_PROTOCOL: http
      NEXT_PUBLIC_NETWORK_NAME: "Gnosis L1"
      NEXT_PUBLIC_NETWORK_SHORT_NAME: "Gnosis"
      NEXT_PUBLIC_NETWORK_ID: "100"
      NEXT_PUBLIC_NETWORK_CURRENCY_NAME: xDAI
      NEXT_PUBLIC_NETWORK_CURRENCY_SYMBOL: xDAI
      NEXT_PUBLIC_NETWORK_CURRENCY_DECIMALS: "18"
      NEXT_PUBLIC_HOMEPAGE_CHARTS: "['daily_txs']"
      NEXT_PUBLIC_IS_TESTNET: "true"
    ports:
      - "4000:3000"

volumes:
  l1-db-data:
