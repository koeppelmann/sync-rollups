services:
  gnosis-l2-db:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_DB: blockscout_gnosis_l2
      POSTGRES_USER: blockscout
      POSTGRES_PASSWORD: blockscout
    volumes:
      - gnosis-l2-db-data:/var/lib/postgresql/data
    ports:
      - "5443:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U blockscout -d blockscout_gnosis_l2"]
      interval: 5s
      timeout: 5s
      retries: 10

  gnosis-l2-backend:
    image: blockscout/blockscout:master
    restart: unless-stopped
    network_mode: host
    command: ["sh", "-c", "bin/blockscout eval 'Elixir.Explorer.ReleaseTasks.create_and_migrate()' && bin/blockscout start"]
    depends_on:
      gnosis-l2-db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://blockscout:blockscout@localhost:5443/blockscout_gnosis_l2
      ETHEREUM_JSONRPC_VARIANT: geth
      ETHEREUM_JSONRPC_HTTP_URL: http://localhost:9646
      ETHEREUM_JSONRPC_TRACE_URL: http://localhost:9646
      NETWORK: SyncRollup L2 (Gnosis)
      SUBNETWORK: SyncRollup
      CHAIN_ID: "10200200"
      COIN: ETH
      BLOCK_TRANSFORMER: base
      INDEXER_DISABLE_INTERNAL_TRANSACTIONS_FETCHER: "false"
      INDEXER_DISABLE_PENDING_TRANSACTIONS_FETCHER: "true"
      INDEXER_DISABLE_ADDRESS_COIN_BALANCE_FETCHER: "false"
      ECTO_USE_SSL: "false"
      SECRET_KEY_BASE: "gnosis79NtB48ear7+wMSf0IQuWDAAazhpb31qyc7GiyspBP2vh7t5zlCsF5QDv76Pn31Nlolb6gQ=="
      PORT: "4021"
      API_V2_ENABLED: "true"
      DISABLE_EXCHANGE_RATES: "true"
      DISABLE_KNOWN_TOKENS: "true"
      SHOW_TXS_CHART: "true"
      HEART_BEAT_TIMEOUT: "30"
      INDEXER_MEMORY_LIMIT: "1g"
      FETCH_REWARDS_WAY: "manual"
      RELEASE_NODE: "blockscout_gnosis_l2"
      ALLOWED_CORS_ORIGINS: "*"

  gnosis-l2-frontend:
    image: ghcr.io/blockscout/frontend:v1.38.2
    restart: unless-stopped
    network_mode: host
    depends_on:
      - gnosis-l2-backend
    environment:
      NEXT_PUBLIC_APP_HOST: 217.182.199.45
      NEXT_PUBLIC_APP_PORT: "4002"
      NEXT_PUBLIC_APP_PROTOCOL: http
      NEXT_PUBLIC_API_HOST: 217.182.199.45
      NEXT_PUBLIC_API_PORT: "4021"
      NEXT_PUBLIC_API_PROTOCOL: http
      NEXT_PUBLIC_NETWORK_NAME: "SyncRollup L2 (Gnosis)"
      NEXT_PUBLIC_NETWORK_SHORT_NAME: "SyncRollup"
      NEXT_PUBLIC_NETWORK_ID: "10200200"
      NEXT_PUBLIC_NETWORK_CURRENCY_NAME: ETH
      NEXT_PUBLIC_NETWORK_CURRENCY_SYMBOL: ETH
      NEXT_PUBLIC_NETWORK_CURRENCY_DECIMALS: "18"
      NEXT_PUBLIC_HOMEPAGE_CHARTS: "['daily_txs']"
      NEXT_PUBLIC_IS_TESTNET: "true"
      PORT: "4002"
      HOSTNAME: "0.0.0.0"
      NEXT_PUBLIC_USE_NEXT_JS_PROXY: "true"
      NEXT_PUBLIC_API_WEBSOCKET_PROTOCOL: ws

volumes:
  gnosis-l2-db-data:
