services:
  l1-db:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_DB: blockscout_l1
      POSTGRES_USER: blockscout
      POSTGRES_PASSWORD: blockscout
    volumes:
      - l1-db-data:/var/lib/postgresql/data
    ports:
      - "5434:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U blockscout -d blockscout_l1"]
      interval: 5s
      timeout: 5s
      retries: 10

  l1-backend:
    image: blockscout/blockscout:master
    restart: unless-stopped
    network_mode: host
    command: ["sh", "-c", "bin/blockscout eval 'Elixir.Explorer.ReleaseTasks.create_and_migrate()' && bin/blockscout start"]
    depends_on:
      l1-db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://blockscout:blockscout@localhost:5434/blockscout_l1
      ETHEREUM_JSONRPC_VARIANT: geth
      ETHEREUM_JSONRPC_HTTP_URL: http://localhost:8545
      ETHEREUM_JSONRPC_TRACE_URL: http://localhost:8545
      NETWORK: SyncRollup L1
      SUBNETWORK: SyncRollup L1
      CHAIN_ID: "31337"
      COIN: ETH
      BLOCK_TRANSFORMER: base
      INDEXER_DISABLE_INTERNAL_TRANSACTIONS_FETCHER: "false"
      INDEXER_DISABLE_PENDING_TRANSACTIONS_FETCHER: "true"
      INDEXER_DISABLE_ADDRESS_COIN_BALANCE_FETCHER: "false"
      FIRST_BLOCK: "0"
      LAST_BLOCK: ""
      ECTO_USE_SSL: "false"
      SECRET_KEY_BASE: "56NtB48ear7+wMSf0IQuWDAAazhpb31qyc7GiyspBP2vh7t5zlCsF5QDv76Pn31Nlolb6gQ/lg=="
      PORT: "4010"
      RELEASE_NODE: "blockscout_l1"
      API_V2_ENABLED: "true"
      DISABLE_EXCHANGE_RATES: "true"
      DISABLE_KNOWN_TOKENS: "true"
      SHOW_TXS_CHART: "true"
      HEART_BEAT_TIMEOUT: "30"
      INDEXER_MEMORY_LIMIT: "1g"
      FETCH_REWARDS_WAY: "manual"

  l1-frontend:
    image: ghcr.io/blockscout/frontend:v1.38.2
    restart: unless-stopped
    network_mode: host
    depends_on:
      - l1-backend
    environment:
      NEXT_PUBLIC_APP_HOST: 217.182.199.45
      NEXT_PUBLIC_APP_PORT: "4000"
      NEXT_PUBLIC_APP_PROTOCOL: http
      NEXT_PUBLIC_API_HOST: 217.182.199.45
      NEXT_PUBLIC_API_PORT: "4010"
      NEXT_PUBLIC_API_PROTOCOL: http
      NEXT_PUBLIC_NETWORK_NAME: "SyncRollup L1"
      NEXT_PUBLIC_NETWORK_SHORT_NAME: "SyncRollup L1"
      NEXT_PUBLIC_NETWORK_ID: "31337"
      NEXT_PUBLIC_NETWORK_CURRENCY_NAME: ETH
      NEXT_PUBLIC_NETWORK_CURRENCY_SYMBOL: ETH
      NEXT_PUBLIC_NETWORK_CURRENCY_DECIMALS: "18"
      NEXT_PUBLIC_HOMEPAGE_CHARTS: "['daily_txs']"
      NEXT_PUBLIC_IS_TESTNET: "true"
      PORT: "4000"
      HOSTNAME: "0.0.0.0"
      NEXT_PUBLIC_USE_NEXT_JS_PROXY: "true"
      NEXT_PUBLIC_API_WEBSOCKET_PROTOCOL: ws

volumes:
  l1-db-data:
