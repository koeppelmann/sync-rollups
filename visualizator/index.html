<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cross-Chain Execution Visualizer</title>
  <style>
    :root {
      --bg: #0a0a0f; --s1: #111118; --s2: #1a1a24; --s3: #222230;
      --brd: #2a2a3a; --tx: #e0e0e8; --dim: #7a7a90;
      --l1: #3b82f6; --l1bg: rgba(59,130,246,0.06); --l1b: rgba(59,130,246,0.2);
      --l2: #a855f7; --l2bg: rgba(168,85,247,0.06); --l2b: rgba(168,85,247,0.2);
      --add: #22d3ee; --rm: #ef4444; --ok: #34d399; --acc: #6366f1; --warn: #f59e0b;
    }
    *{margin:0;padding:0;box-sizing:border-box}
    body{font-family:'SF Mono','Fira Code','JetBrains Mono',monospace;background:var(--bg);color:var(--tx);min-height:100vh}
    header{text-align:center;padding:1.2rem 1rem 0.6rem;border-bottom:1px solid var(--brd)}
    header h1{font-size:1.2rem;font-weight:700}
    header p{color:var(--dim);font-size:0.65rem;margin-top:0.15rem}
    .tabs{display:flex;justify-content:center;gap:0.4rem;padding:0.6rem 1rem;flex-wrap:wrap;border-bottom:1px solid var(--brd)}
    .tab{padding:0.35rem 0.7rem;border:1px solid var(--brd);border-radius:5px;background:var(--s1);color:var(--dim);cursor:pointer;font-family:inherit;font-size:0.65rem;transition:all 0.15s}
    .tab:hover{border-color:var(--acc);color:var(--tx)}
    .tab.active{background:var(--acc);border-color:var(--acc);color:#fff}
    .info{text-align:center;padding:0.6rem}
    .info h2{font-size:0.95rem;margin-bottom:0.1rem}
    .info .flow{color:var(--add);font-size:0.8rem}
    .info .dir{color:var(--dim);font-size:0.6rem;margin-top:0.1rem}
    .main{max-width:1100px;margin:0 auto;padding:0 0.75rem 2rem}

    /* Diagram */
    .diagram-wrap{margin-bottom:0.6rem;min-height:48px}
    .diagram-box{background:var(--s1);border:1px solid var(--brd);border-radius:8px;padding:0.6rem 0.75rem;overflow-x:auto}
    .diagram-label{font-size:0.55rem;color:var(--dim);margin-bottom:0.35rem;text-transform:uppercase;letter-spacing:0.06em;font-weight:700}
    .diagram-label.reentrant{color:var(--warn)}
    .flow-row{display:flex;align-items:center;gap:0;flex-wrap:nowrap;padding:0.2rem 0}
    .fnode{padding:0.25rem 0.5rem;border-radius:5px;border:1.5px solid var(--brd);text-align:center;background:var(--s2);flex-shrink:0}
    .fnode .fn{font-size:0.65rem;font-weight:700}
    .fnode .fs{font-size:0.5rem;color:var(--dim);margin-top:0.05rem}
    .fnode.user{border-color:#666;background:var(--s3)}
    .fnode.contract.l1{border-color:var(--l1)}
    .fnode.contract.l2{border-color:var(--l2)}
    .fnode.proxy{border-style:dashed}
    .fnode.proxy.l1{border-color:rgba(59,130,246,0.5)}
    .fnode.proxy.l2{border-color:rgba(168,85,247,0.5)}
    .fnode.system.l1{border-color:var(--l1);background:var(--l1bg)}
    .fnode.system.l2{border-color:var(--l2);background:var(--l2bg)}
    .fnode.highlight{box-shadow:0 0 10px rgba(34,211,238,0.3);border-color:var(--add)}
    .farr{display:flex;flex-direction:column;align-items:center;flex-shrink:0;padding:0 0.15rem}
    .farr-line{width:32px;height:1.5px;background:var(--dim);position:relative}
    .farr-line::after{content:'';position:absolute;right:-1px;top:-3px;border:4px solid transparent;border-left:5px solid var(--dim)}
    .farr-lbl{font-size:0.45rem;color:var(--dim);white-space:nowrap;margin-bottom:0.1rem;max-width:90px;overflow:hidden;text-overflow:ellipsis}

    /* Tables */
    .tbl-row{display:grid;grid-template-columns:1fr 1fr;gap:0.6rem;margin-bottom:0.6rem}
    .tbl-panel{border-radius:8px;border:1px solid var(--brd);background:var(--s1);overflow:hidden}
    .tbl-panel.l1{border-color:var(--l1b)}
    .tbl-panel.l2{border-color:var(--l2b)}
    .tbl-hdr{display:flex;align-items:center;justify-content:space-between;padding:0.4rem 0.6rem;border-bottom:1px solid var(--brd);font-size:0.62rem;font-weight:700}
    .tbl-panel.l1 .tbl-hdr{background:var(--l1bg);color:var(--l1)}
    .tbl-panel.l2 .tbl-hdr{background:var(--l2bg);color:var(--l2)}
    .tbl-cnt{font-size:0.55rem;padding:0.08rem 0.35rem;border-radius:3px;background:var(--s2);color:var(--dim)}
    .tbl-body{min-height:40px;padding:0.3rem}
    .tbl-empty{text-align:center;color:var(--dim);font-size:0.55rem;padding:0.5rem;opacity:0.4}

    /* Table entries */
    .te{border-radius:5px;margin-bottom:0.25rem;border:1px solid var(--brd);background:var(--s2);transition:all 0.3s;font-size:0.6rem;overflow:hidden}
    .te.ja{border-color:var(--add);box-shadow:0 0 8px rgba(34,211,238,0.15)}
    .te.jc{border-color:var(--rm);opacity:0.35;box-shadow:0 0 8px rgba(239,68,68,0.12)}
    .te.jc .te-summary{text-decoration:line-through}
    .te.consumed{opacity:0.25}
    .te.consumed .te-summary{text-decoration:line-through}
    .te-summary{display:flex;align-items:flex-start;gap:0.35rem;padding:0.3rem 0.45rem;cursor:pointer}
    .te-summary:hover{background:var(--s3)}
    .te-idx{flex-shrink:0;width:15px;height:15px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:0.45rem;font-weight:700;background:var(--s3);color:var(--dim);margin-top:1px}
    .te-compact{flex:1;line-height:1.4}
    .te-h{color:var(--dim)}
    .te-arr{color:var(--warn);margin:0 0.2rem}
    .te-n{color:var(--ok)}
    .te-d{display:block;color:var(--dim);font-size:0.5rem;opacity:0.7;margin-top:0.05rem}
    .te-toggle{flex-shrink:0;font-size:0.5rem;color:var(--dim);margin-top:1px;cursor:pointer}

    /* Expanded entry details */
    .te-details{border-top:1px solid var(--brd);padding:0.35rem 0.5rem;background:rgba(0,0,0,0.2);font-size:0.55rem}
    .te-section{margin-bottom:0.35rem}
    .te-section:last-child{margin-bottom:0}
    .te-sec-hdr{font-size:0.5rem;font-weight:700;color:var(--acc);margin-bottom:0.15rem;text-transform:uppercase;letter-spacing:0.05em}
    .te-kv{display:grid;grid-template-columns:90px 1fr;gap:0.1rem 0.4rem;font-size:0.53rem}
    .te-k{color:var(--dim)}
    .te-v{color:var(--tx);word-break:break-all}
    .te-v.hl{color:var(--add)}

    /* Contract states */
    .st-row{display:grid;grid-template-columns:1fr 1fr;gap:0.6rem;margin-bottom:0.6rem}
    .st-panel{border-radius:8px;border:1px solid var(--brd);background:var(--s1);padding:0.4rem 0.6rem}
    .st-panel.l1{border-color:var(--l1b)}
    .st-panel.l2{border-color:var(--l2b)}
    .st-panel h4{font-size:0.55rem;text-transform:uppercase;letter-spacing:0.06em;margin-bottom:0.3rem;opacity:0.5}
    .st-panel.l1 h4{color:var(--l1)}
    .st-panel.l2 h4{color:var(--l2)}
    .cs{display:flex;justify-content:space-between;font-size:0.58rem;padding:0.1rem 0;border-bottom:1px solid rgba(255,255,255,0.03)}
    .cs .k{color:var(--dim)}
    .cs .v{font-weight:700}
    .cs .v.ch{color:var(--ok)}

    /* Controls */
    .ctrl{display:flex;justify-content:center;gap:0.35rem;margin-bottom:0.6rem}
    .btn{padding:0.3rem 0.65rem;border:1px solid var(--brd);border-radius:5px;background:var(--s1);color:var(--tx);cursor:pointer;font-family:inherit;font-size:0.63rem;transition:all 0.15s}
    .btn:hover{border-color:var(--acc)}
    .btn.pr{background:var(--acc);border-color:var(--acc);color:#fff}
    .btn.pr:hover{background:#4f46e5}

    /* Steps */
    .steps{margin-bottom:1.5rem}
    .si{display:flex;gap:0.5rem;padding:0.4rem 0.5rem;border-radius:6px;margin-bottom:0.3rem;border:1px solid transparent;background:var(--s1);font-size:0.63rem;line-height:1.45;cursor:pointer;transition:all 0.15s;opacity:0.25}
    .si.played{opacity:0.65}
    .si.active{opacity:1;border-color:var(--acc);background:var(--s2)}
    .si-num{flex-shrink:0;width:17px;height:17px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:0.5rem;font-weight:700;background:var(--s3);color:var(--dim);margin-top:2px}
    .si.active .si-num{background:var(--acc);color:#fff}
    .si-badge{flex-shrink:0;padding:0.08rem 0.3rem;border-radius:3px;font-size:0.5rem;font-weight:700;margin-top:2px}
    .si-badge.l1{background:var(--l1bg);color:var(--l1);border:1px solid var(--l1b)}
    .si-badge.l2{background:var(--l2bg);color:var(--l2);border:1px solid var(--l2b)}
    .si-body{flex:1}
    .si-title{font-weight:700;margin-bottom:0.05rem}
    .si-det{color:var(--dim);font-size:0.55rem}
    .si-tc{margin-top:0.15rem;font-size:0.52rem}
    .tc-a{color:var(--add)}.tc-r{color:var(--rm)}

    /* Persistent architecture diagram */
    .arch-wrap{margin-bottom:0.6rem}
    .arch-box{background:var(--s1);border:1px solid var(--brd);border-radius:8px;padding:0.5rem;overflow-x:auto}
    .arch-svg{width:100%;display:block}

    /* Detail call flow (below SVG) */
    .detail-flow{margin-top:0.4rem;border-top:1px solid var(--brd);padding-top:0.35rem}

    @media(max-width:700px){.tbl-row,.st-row{grid-template-columns:1fr}.flow-row{flex-wrap:wrap}}
  </style>
</head>

      diagram:[ ['Rollups','scope=[0]','system','l1'], 'execOnBehalf', ["D'",'REENTRANT','proxy','l1'], 'inc()', ['C','counter: 0→1','contract','l1'] ]
    },
    { chain:'l2', title:'↙ Back to L2: D returns → RESULT(void) consumed',
      detail:'D.increment() returns (void). Builds RESULT{L2,data=""} → matches L2 entry 2 → consumed → terminal.',
      l1Add:[], l1Rm:[], l2Add:[], l2Rm:['s4e4'], state:{},
      activeNodes:['D','Cprime','ManagerL2'], activeEdges:['D-return-Cprime','Cprime-return-ManagerL2'],
      diagram:[ ['D','returns void','contract','l2'], 'RESULT{""}', ['ManagerL2','terminal','system','l2'] ]
    },
    { chain:'l1', title:'↙ Back to L1: scope nav returns → Alice\'s call completes',
      detail:'Scope navigation unwinds. RESULT propagates back through D\' → executeCrossChainCall → D\'.fallback returns to Alice.',
      l1Add:[], l1Rm:[], l2Add:[], l2Rm:[], state:{},
      activeNodes:['Rollups','Dprime','Alice'], activeEdges:['Rollups-return-Dprime','Dprime→Alice'],
      diagram:[ ['Rollups','RESULT','system','l1'], 'returns', ["D'",'','proxy','l1'], 'returns', ['Alice','done','user',''] ]
    }
  ]
}
};

// ═══ State ═══════════════════════════════════════════════════════

let ak = 's1', cs = -1, pt = null;
const collapsed = new Set();

function compute(scenario, upto) {
  const l1=[], l2=[], st={};
  for (const c of scenario.contracts.l1) st[c]=0;
  for (const c of scenario.contracts.l2) st[c]=0;
  for (const c of scenario.contracts.extra) st[c]='S0';
  for (let i=0;i<=upto;i++) {
    const s = scenario.steps[i];
    for (const id of s.l1Add) l1.push({...E[id], status: i===upto?'ja':'ok'});
    for (const id of s.l2Add) l2.push({...E[id], status: i===upto?'ja':'ok'});
    for (const id of s.l1Rm) { const e=l1.find(x=>x.id===id); if(e) e.status=i===upto?'jc':'consumed'; }
    for (const id of s.l2Rm) { const e=l2.find(x=>x.id===id); if(e) e.status=i===upto?'jc':'consumed'; }
    if(s.state) for (const[k,v] of Object.entries(s.state)) st[k]=v;
  }
  return {l1,l2,st};
}

// ═══ Render ══════════════════════════════════════════════════════

function renderTabs() {
  document.getElementById('tabs').innerHTML = Object.entries(S).map(([k,s])=>
    `<button class="tab ${k===ak?'active':''}" onclick="sel('${k}')">#${k[1]}: ${s.flow}</button>`
  ).join('');
}

function render() {
  const sc=S[ak], st=cs>=0?compute(sc,cs):compute(sc,-1);
  const step = cs>=0 ? sc.steps[cs] : null;
  let h = `<div class="info"><h2>${sc.title}</h2><div class="flow">${sc.flow}</div><div class="dir">${sc.dir}</div></div>`;

  // Architecture diagram (persistent, all components always visible)
  h += '<div class="arch-wrap"><div class="arch-box">';
  h += renderArchDiagram(ak, step);
  // Detail call flow strip below SVG
  if (step && step.diagram) {
    h += '<div class="detail-flow">';
    h += '<div class="diagram-label">Call flow detail:</div>';
    h += renderDiagram(step.diagram);
    if (step.diagram2) {
      h += `<div class="diagram-label reentrant" style="margin-top:0.3rem">${step.d2label||'Inner call:'}</div>`;
      h += renderDiagram(step.diagram2);
    }
    h += '</div>';
  }
  h += '</div></div>';

  // Tables
  h += `<div class="tbl-row">${renderTbl('L1 Execution Table (Rollups)','l1',st.l1)}${renderTbl('L2 Execution Table (ManagerL2)','l2',st.l2)}</div>`;

  // States
  h += `<div class="st-row">
    <div class="st-panel l1"><h4>L1 Contracts</h4>${sc.contracts.l1.map(c=>csv(c,st.st[c],step)).join('')}${sc.contracts.extra.map(c=>csv(c,st.st[c],step)).join('')}</div>
    <div class="st-panel l2"><h4>L2 Contracts</h4>${sc.contracts.l2.map(c=>csv(c,st.st[c],step)).join('')}</div>
  </div>`;

  // Controls
  h += `<div class="ctrl">
    <button class="btn" onclick="reset()">Reset</button>
    <button class="btn" onclick="prev()">&#9664; Prev</button>
    <button class="btn pr" onclick="next()">Next &#9654;</button>
    <button class="btn" onclick="play()">&#9654; Play</button>
  </div>`;

  // Steps
  h += '<div class="steps">';
  sc.steps.forEach((s,i)=>{
    let c='future'; if(i<cs)c='played'; else if(i===cs)c='active';
    let tc='';
    if(s.l1Add.length) tc+=s.l1Add.map(id=>`<span class="tc-a">+L1 ${E[id].hash.split('{')[0]}…</span> `).join('');
    if(s.l1Rm.length) tc+=`<span class="tc-r">-L1 ${s.l1Rm.length} consumed</span> `;
    if(s.l2Add.length) tc+=s.l2Add.map(id=>`<span class="tc-a">+L2 ${E[id].hash.split('{')[0]}…</span> `).join('');
    if(s.l2Rm.length) tc+=`<span class="tc-r">-L2 ${s.l2Rm.length} consumed</span>`;
    h += `<div class="si ${c}" onclick="jump(${i})">
      <div class="si-num">${i+1}</div>
      <div class="si-badge ${s.chain}">${s.chain.toUpperCase()}</div>
      <div class="si-body">
        <div class="si-title">${s.title}</div>
        <div class="si-det">${s.detail}</div>
        ${tc?`<div class="si-tc">${tc}</div>`:''}
      </div>
    </div>`;
  });
  h += '</div>';

  document.getElementById('app').innerHTML = h;
}

function renderDiagram(d) {
  let h = '<div class="flow-row">';
  for (const item of d) {
    if (typeof item === 'string') {
      h += `<div class="farr"><div class="farr-lbl">${item}</div><div class="farr-line"></div></div>`;
    } else {
      const [label, sub, type, chain] = item;
      h += `<div class="fnode ${type} ${chain}"><div class="fn">${label}</div>${sub?`<div class="fs">${sub}</div>`:''}</div>`;
    }
  }
  h += '</div>';
  return h;
}

function renderArchDiagram(scenarioKey, step) {
  const arch = ARCH[scenarioKey];
  if (!arch) return '';

  const activeN = new Set(step ? (step.activeNodes||[]) : []);
  const activeE = new Set(step ? (step.activeEdges||[]) : []);

  // Layout: column-based, proxies aligned with originals
  const nodeW=88, nodeH=42, padX=20, padTop=28, padBot=24, gapY=28;
  const cols = arch.cols || 4;
  const cellW = nodeW + 28;
  const svgW = cols * cellW + 2*padX;
  const laneH = nodeH + padTop + padBot;
  const svgH = 2*laneH + gapY;

  // Position nodes by column
  const pos = {};
  function place(nodes, laneIdx) {
    const y = laneIdx === 0 ? padTop : laneH + gapY + padTop;
    for (const n of nodes) {
      const x = padX + n.col * cellW + (cellW - nodeW)/2;
      pos[n.id] = { x, y, cx: x + nodeW/2, cy: y + nodeH/2 };
    }
  }
  place(arch.l1, 0);
  place(arch.l2, 1);

  // Colors
  const colors = {
    'contract-l1':'#3b82f6','proxy-l1':'rgba(59,130,246,0.5)',
    'contract-l2':'#a855f7','proxy-l2':'rgba(168,85,247,0.5)',
    'system-l1':'#3b82f6','system-l2':'#a855f7','user':'#666'
  };
  function nodeColor(n) {
    if (n.type==='ghost') return '#4a4a60';
    return n.type==='user' ? colors.user : (colors[n.type+'-'+n.chain] || '#555');
  }

  let svg = `<svg class="arch-svg" viewBox="0 0 ${svgW} ${svgH}" xmlns="http://www.w3.org/2000/svg">`;

  // Defs: arrowheads
  svg += `<defs>
    <marker id="ah-dim" viewBox="0 0 10 7" refX="9" refY="3.5" markerWidth="7" markerHeight="5" orient="auto-start-reverse">
      <path d="M0,0 L10,3.5 L0,7z" fill="#3a3a50"/>
    </marker>
    <marker id="ah-lit" viewBox="0 0 10 7" refX="9" refY="3.5" markerWidth="7" markerHeight="5" orient="auto-start-reverse">
      <path d="M0,0 L10,3.5 L0,7z" fill="#22d3ee"/>
    </marker>
  </defs>`;

  // Lane backgrounds
  svg += `<rect x="0" y="0" width="${svgW}" height="${laneH}" rx="6" fill="rgba(59,130,246,0.04)" stroke="rgba(59,130,246,0.12)" stroke-width="1"/>`;
  svg += `<rect x="0" y="${laneH+gapY}" width="${svgW}" height="${laneH}" rx="6" fill="rgba(168,85,247,0.04)" stroke="rgba(168,85,247,0.12)" stroke-width="1"/>`;

  // Thin cross-chain boundary line
  const bndY = laneH + gapY/2;
  svg += `<line x1="10" y1="${bndY}" x2="${svgW-10}" y2="${bndY}" stroke="#2a2a3a" stroke-width="0.5" stroke-dasharray="3 4" opacity="0.4"/>`;
  svg += `<text x="6" y="10" fill="#3b82f6" font-size="7" font-family="monospace" font-weight="700" opacity="0.6">L1</text>`;
  svg += `<text x="6" y="${laneH+gapY+10}" fill="#a855f7" font-size="7" font-family="monospace" font-weight="700" opacity="0.6">L2</text>`;

  // Internal edges — arcs above (forward) / below (back) so labels don't overlap nodes
  let labels = ''; // collect labels to render on top of everything
  for (const e of (arch.edges||[])) {
    const p1 = pos[e.from], p2 = pos[e.to];
    if (!p1 || !p2) continue;
    const edgeId = e.id || (e.from+'→'+e.to);
    const lit = activeE.has(edgeId);
    const stroke = lit ? '#22d3ee' : '#2a2a3a';
    const op = lit ? '0.85' : '0.12';
    const marker = lit ? 'url(#ah-lit)' : 'url(#ah-dim)';
    const sw = lit ? 1.5 : 0.7;
    const glow = lit ? 'style="filter:drop-shadow(0 0 4px rgba(34,211,238,0.35))"' : '';

    if (Math.abs(p1.cy - p2.cy) < 5) {
      // Same lane
      const goRight = p1.cx < p2.cx;
      const x1 = goRight ? p1.x+nodeW : p1.x;
      const x2 = goRight ? p2.x : p2.x+nodeW;
      const baseY = p1.cy;
      // back arrows arc below node bottom, forward arrows arc above node top
      // alt:true flips the direction
      const defaultDir = e.back ? 1 : -1;
      const arcDir = e.alt ? -defaultDir : defaultDir;
      const arcH = (arcDir === 1) ? (nodeH/2 + 12) : (nodeH/2 + 10);
      const midX = (x1+x2)/2;
      const midY = baseY + arcDir * arcH;
      const y1 = e.back ? (p1.y + nodeH) : p1.y;
      const y2 = e.back ? (p2.y + nodeH) : p2.y;
      svg += `<path d="M${x1},${y1} Q${midX},${midY} ${x2},${y2}" stroke="${stroke}" stroke-width="${sw}" fill="none" opacity="${op}" marker-end="${marker}" ${glow}/>`;

      // Label at arc apex — collected for later (rendered on top)
      if (e.label && lit) {
        const lblY = midY + arcDir * 4;
        labels += `<text x="${midX}" y="${lblY}" text-anchor="middle" fill="#22d3ee" font-size="7" font-family="monospace" font-weight="700" opacity="0.95">${e.label}</text>`;
      }
    } else {
      // Cross-lane (rare for internal edges)
      const x1 = p1.cx, x2 = p2.cx;
      const y1 = p1.cy < p2.cy ? p1.y+nodeH : p1.y;
      const y2 = p2.cy < p1.cy ? p2.y+nodeH : p2.y;
      svg += `<line x1="${x1}" y1="${y1}" x2="${x2}" y2="${y2}" stroke="${stroke}" stroke-width="${sw}" opacity="${op}" marker-end="${marker}" ${glow}/>`;
      if (e.label && lit) {
        labels += `<text x="${(x1+x2)/2}" y="${(y1+y2)/2-4}" text-anchor="middle" fill="#22d3ee" font-size="7" font-family="monospace" font-weight="700" opacity="0.95">${e.label}</text>`;
      }
    }
  }

  // Nodes
  const allNodes = [...arch.l1.map(n=>({...n,chain:'l1'})), ...arch.l2.map(n=>({...n,chain:'l2'}))];
  for (const n of allNodes) {
    const p = pos[n.id];
    if (!p) continue;
    const lit = activeN.has(n.id);
    const col = nodeColor(n);
    const isGhost = n.type==='ghost';
    const op = lit ? (isGhost ? 0.7 : 1) : (isGhost ? 0.08 : 0.25);
    const dashArr = (n.type==='proxy'||isGhost) ? 'stroke-dasharray="4 2"' : '';
    const glow = lit ? `filter="drop-shadow(0 0 8px ${col})"` : '';

    svg += `<g opacity="${op}" ${glow}>`;
    svg += `<rect x="${p.x}" y="${p.y}" width="${nodeW}" height="${nodeH}" rx="5" fill="${lit?'rgba(20,20,35,0.9)':'rgba(15,15,25,0.6)'}" stroke="${col}" stroke-width="${lit?1.8:1}" ${dashArr}/>`;
    svg += `<text x="${p.cx}" y="${p.y+16}" text-anchor="middle" fill="${lit?'#e0e0e8':'#7a7a90'}" font-size="9" font-weight="700" font-family="monospace">${n.label}</text>`;
    if (n.sub) {
      svg += `<text x="${p.cx}" y="${p.y+27}" text-anchor="middle" fill="${lit?'#7a7a90':'#4a4a60'}" font-size="6" font-family="monospace">${n.sub}</text>`;
    }
    svg += `</g>`;
  }

  // Labels on top of everything
  svg += labels;

  svg += '</svg>';
  return svg;
}

function renderTbl(title, chain, entries) {
  const visible = entries;
  const active = entries.filter(e=>e.status==='ok'||e.status==='ja').length;
  let h = `<div class="tbl-panel ${chain}"><div class="tbl-hdr"><span>${title}</span><span class="tbl-cnt">${active} entries</span></div><div class="tbl-body">`;
  if (!visible.length) {
    h += '<div class="tbl-empty">(empty)</div>';
  } else {
    visible.forEach((e,i) => {
      const isExp = !collapsed.has(e.id);
      h += `<div class="te ${e.status}">`;
      h += `<div class="te-summary" onclick="tog('${e.id}')">`;
      h += `<div class="te-idx">${i+1}</div>`;
      h += `<div class="te-compact"><span class="te-h">${e.hash}</span><span class="te-arr"> → </span><span class="te-n">${e.next}</span>`;
      if(e.delta) h += `<span class="te-d">${e.delta}</span>`;
      h += `</div><div class="te-toggle">${isExp?'▲':'▼'}</div></div>`;
      if (isExp) {
        h += '<div class="te-details">';
        h += renderAction('Action (hashed as actionHash)', e.action);
        h += renderAction('Next Action (returned on match)', e.nextAct);
        if (e.sd) {
          h += '<div class="te-section"><div class="te-sec-hdr">State Delta</div><div class="te-kv">';
          h += kv('rollupId', e.sd.rollupId) + kv('currentState', e.sd.currentState) + kv('newState', e.sd.newState, true) + kv('etherDelta', e.sd.etherDelta);
          h += '</div></div>';
        }
        h += '</div>';
      }
      h += '</div>';
    });
  }
  h += '</div></div>';
  return h;
}

function renderAction(title, a) {
  let h = `<div class="te-section"><div class="te-sec-hdr">${title}</div><div class="te-kv">`;
  h += kv('actionType', a.actionType, true);
  h += kv('rollupId', a.rollupId);
  h += kv('destination', a.destination);
  h += kv('value', a.value);
  h += kv('data', a.data, a.data && a.data !== '0' && a.data !== 'address(0)');
  h += kv('failed', a.failed);
  h += kv('sourceAddress', a.sourceAddress);
  h += kv('sourceRollup', a.sourceRollup);
  h += kv('scope', a.scope);
  h += '</div></div>';
  return h;
}

function kv(k,v,hl) {
  return `<span class="te-k">${k}</span><span class="te-v${hl?' hl':''}">${v}</span>`;
}

function csv(name, val, step) {
  let ch = step && step.state && step.state[name] !== undefined;
  return `<div class="cs"><span class="k">${name}</span><span class="v${ch?' ch':''}">${val}</span></div>`;
}

// ═══ Controls ════════════════════════════════════════════════════

function sel(k) { stop(); ak=k; cs=-1; collapsed.clear(); renderTabs(); render(); }
function next() { const sc=S[ak]; if(cs<sc.steps.length-1){cs++;render();return true} stop();return false; }
function prev() { if(cs>=0){cs--;render();} }
function reset() { stop(); cs=-1; collapsed.clear(); render(); }
function jump(i) { stop(); cs=i; render(); }
function play() { stop(); cs=-1; render(); pt=setInterval(()=>{if(!next())stop();},1500); }
function stop() { if(pt){clearInterval(pt);pt=null;} }
function tog(id) { collapsed.has(id)?collapsed.delete(id):collapsed.add(id); render(); }

document.addEventListener('keydown', e => {
  if (e.key === 'ArrowRight' || e.key === 'ArrowDown') { e.preventDefault(); next(); }
  else if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') { e.preventDefault(); prev(); }
  else if (e.key === 'Escape') { e.preventDefault(); reset(); }
});

renderTabs(); render();
</script>
</body>
</html>
